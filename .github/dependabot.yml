version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      django:
        patterns:
          - "django"
          - "django-*"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
          - "django-storages"
      dev-tools:
        dependency-type: "development"
      production-patches:
        dependency-type: "production"
        update-types:
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/deploy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - "dependencies"
      - "docker"
    # Postgres major bumps (17 → 18) change the on-disk format. CI doesn't
    # catch this — it would only show up when the new database container
    # tries to open the existing pg-data volume in production. Keep these
    # behind a human review for the pg_upgrade dance.
    ignore:
      - dependency-name: "postgres"
        update-types:
          - "version-update:semver-major"
